<!DOCTYPE html>
<html>
<head>
<title>Movie Explorer</title>
<style>
body{
    font-family:Arial;
    background:linear-gradient(to right,#1e3c72,#2a5298);
    margin:0;
    padding:20px;
}
h1{
    color:white;
    text-align:center;
}

.stats{
    background:white;
    width:250px;
    margin:auto;
    padding:15px;
    border-radius:15px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
}
.search-box{
    text-align:center;
    margin:20px;
}
input{
    padding:10px;
    width:300px;
    border-radius:10px;
}
button{
    padding:10px;
    border:none;
    border-radius:10px;
    background:orange;
    cursor:pointer;
}
.container{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
}
.card{
    background:white;
    width:300px;
    margin:15px;
    padding:15px;
    border-radius:15px;
    box-shadow:0px 5px 15px rgba(0,0,0,0.3);
    transition:0.3s;
}
.card:hover{
    transform:scale(1.05);
}
.movie-title{
    color:#1e3c72;
    font-size:20px;
    font-weight:bold;
}
</style>
</head>
<body>
<h1>🎬 Movie Explorer Dashboard</h1>
<div class="stats">
Total Movies : {{ total_movies }}
</div>
<div class="search-box">
<form>
<input type="text"name="search"placeholder="Search Movie">

<button type="submit">
Search
</button>
</form>
</div>
<div class="container">
{% for movie in movies %}
<div class="card">
{% for key,value in movie.items() %}
<p>
<b>{{ key }}</b>
<br>
{{ value }}
</p>
{% endfor %}
</div>
{% endfor %}
</div>
</body>
</html>
